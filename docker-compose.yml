version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
    container_name: stackwatch-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - HOST=0.0.0.0
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    container_name: stackwatch-backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - PORT=5001
    command: npm run dev